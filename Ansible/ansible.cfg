[defaults]
# Основной инвентарь
inventory = inventory/prod

# Путь к ролям (указываем директорию, а не конкретную роль)
roles_path = roles

# Отключаем проверку ключей для разработки
host_key_checking = False

# Отключаем файлы повторных попыток
retry_files_enabled = False

# Умный сбор фактов
gathering = smart

# Кеширование фактов
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache
fact_caching_timeout = 3600

# Логирование
log_path = /var/log/ansible.log

[ssh_connection]
# Оптимизация SSH
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r

[privilege_escalation]
# Настройки привилегий
become = True
become_method = sudo
become_user = root
become_ask_pass = False
